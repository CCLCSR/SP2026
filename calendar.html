<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity Calendar | Swachhata Pakhwada 2026</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Calendar-specific adjustments */
    .calendar-container { max-width: 900px; margin-top: -30px; position: relative; z-index: 10; }
    .calendar-card { background: var(--paper); padding: 30px; border-radius: var(--radius); box-shadow: var(--shadow-lift); border: 1px solid var(--line); }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--ink-soft); font-style: italic; }
  </style>
</head>
<body>

  <!-- Navbar (Same as index.html) -->
  <nav class="navbar">
    <div class="container">
      <div class="brand">
        <div class="seal">CCL</div>
        <div>Swachhata Pakhwada <span style="color: var(--saffron);">2026</span></div>
      </div>
      <div class="navlinks">
        <a href="index.html">Home</a>
        <a href="calendar.html" class="active">📅 Calendar</a>
        <a href="areas.html">Areas</a>
        <a href="gallery.html">Gallery</a>
        <a href="news.html">News</a>
        <a href="reports.html">Reports</a>
      </div>
    </div>
  </nav>

  <!-- Page Hero -->
  <header class="page-hero" style="padding-bottom: 80px;">
    <div class="container" style="max-width: 900px;">
      <div class="breadcrumb"><a href="index.html">Home</a> / Calendar</div>
      <h1>Live Activity Ledger</h1>
      <p>Filter and track the 100+ environmental activities planned and executed across 10 areas.</p>
    </div>
  </header>

  <!-- Main Calendar Section -->
  <section style="padding-top: 0;">
    <div class="container calendar-container">
      <div class="calendar-card">
        
        <!-- Filters -->
        <div class="filters">
          <select id="areaFilter">
            <option value="ALL">📍 All Areas</option>
            <option value="ARGADA">Argada</option>
            <option value="BK">B&K Area</option>
            <option value="BARKA_SAYAL">Barka Sayal</option>
            <option value="CRS_BARKAKANA">CRS Barkakana</option>
            <option value="GIRIDIH">Giridih</option>
            <option value="HAZARIBAGH">Hazaribagh</option>
            <option value="KATHARA">Kathara</option>
            <option value="KUJU">Kuju</option>
            <option value="MS">Magadh–Sanghmitra</option>
            <option value="RAJHARA">Rajhara</option>
          </select>

          <select id="themeFilter">
            <option value="ALL">🏷️ All Themes</option>
            <option value="awareness">Awareness & IEC</option>
            <option value="workshops">Training & Workshops</option>
            <option value="cleanliness">Cleanliness Drives</option>
            <option value="village">Village Sanitation</option>
            <option value="water">Water Conservation</option>
            <option value="plastic">Plastic-Free Campaign</option>
            <option value="solidwaste">Solid Waste Mgmt</option>
            <option value="plantation">Green Initiatives</option>
            <option value="school">School Engagement</option>
            <option value="innovation">Special Initiatives</option>
          </select>
        </div>

        <!-- JS Injects the Ledger Here -->
        <div class="ledger" id="calendar-body">
          <!-- Populated by calendar.js -->
        </div>

      </div>
    </div>
  </section>

  <!-- Load Data First, Then Logic -->
  <script src="js/calendar-data.js"></script>
  <script src="js/calendar.js"></script>
</body>
</html>
